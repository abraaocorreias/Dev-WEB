<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Preview Card Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">

        <div class="card-image-container">
            <img src="./assets/images/image-equilibrium.jpg" alt="Cubo Equilibrium" class="main-image">

            <div class="overlay">
                <img src="./assets/images/icon-view.svg" alt="Ícone de visualização">
            </div>
        </div>

        <div class="card-content">
            <h1 class="title"><a href="#">Equilibrium #3429</a></h1>
            <p class="description">Our Equilibrium collection promotes balance and calm.</p>

            <div class="card-info">
                
                <div class="price">
                    <img src="./assets/images/icon-ethereum.svg" alt="Ícone do Ethereum">
                    <span>0.041 ETH</span>
                </div>
                
                <div class="time">
                    <img src="./assets/images/icon-clock.svg" alt="Ícone de relógio">
                    <span>3 days left</span>
                </div>
                
            </div>
        </div>

        <div class="card-footer">
            <img src="./assets/images/image-avatar.png" alt="Foto de Jules Wyvern" class="avatar">
            <p>Creation of <a href="#" class="creator-name">Jules Wyvern</a></p>
        </div>

    </main>
</body>
</html>
