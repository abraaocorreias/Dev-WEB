<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Link Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
</head>
<body>
    <main class="container">
        <div class="profile">
            <div id="profile-picture">
                <img src="./images/avatar-jessica.jpeg" alt="Foto de perfil da Jessica Randall">
            </div>
            <h1 class="profile-name">Jessica Randall</h1>
            <h2 class ="profile-location">London, United Kingdom</h3>
            <p class="profile-bio">"Front-end Developer and avid reader."</p>
        </div>
        <nav class="social">
            <ul>
                <li class="social-links"><a href="#">GitHub</a></li>
                <li class="social-links"><a href="#">Frontend Mentor</a></li>
                <li class="social-links"><a href="#">LinkedIn</a></li>
                <li class="social-links"><a href="#">Twitter</a></li>
                <li class="social-links"><a href="#">Instagram</a></li>
            </ul>
        </nav>
    </main>
</body>
</html>
